<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/style/index.css">
    <title>Leitura Missa</title>
</head>
<body>
    <div id="container">
        <!--
            Header do app, onde terá uma img da cruz a data do dia e um span 'Leitura da missa', cada um com seu id especifico para poder acessar via js.
        -->
        <header>
            <img id="img_cross_header" src="assets/img/cross.png" alt="imagem de uma cruz dourada">
            <p id="date">Sábado, 31 de Maio de 2026</p>
            <span id="logo_missa">Leitura da Missa</span>
        </header>

        <!--Div onde contem os 4 botoes para as leituras-->
        <div id="btn_to_read">
            <!-- Primeira leitura-->
            <div class="btn">
                <img class="img_btn" src="assets/img/leitura_1.png" alt="">
                <span>1ª Leitura</span>
            </div>

            <!-- Salmo-->
            <div class="btn">
                <img class="img_btn" src="assets/img/harp.png" alt="">
                <span>Salmo</span>
            </div>

            <!-- Segunda leitura-->
            <div class="btn">
                <img class="img_btn" src="assets/img/leitura_2.png" alt="">
                <span>2ª Leitura</span>
            </div>

            <!-- Evangelho-->
            <div class="btn" onclick="buscarDados()">
                <img class="img_btn" src="assets/img/evangelho.png" alt="">
                <span>Evangelho</span>
            </div>
        </div>

        <!--Div onde aparecerá as leituras e o salmo, vinda da requisao de uma API -->
        <div id="content">
            <div id="tittle">
                <h2 id="titulo">LEITURA DO EVANGELHO</h2>
                <span id="referencia">(Lucas 1, 39-56)</span>
            </div>
            
            <div id="text_content">
                
                

            </div>
        </div>

        <footer>
            <p>Desenvovido por Igor Mariano</p>
        </footer>
    </div>
</body>

<script src="assets/Js/script.js"></script>
</html>
