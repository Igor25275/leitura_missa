<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />


    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/style/index.css">
    <title>Leitura Missa</title>

    <link rel="icon" href="assets/img/book.png">
    <link rel="apple-touch-icon" href="assets/img/book.png">
</head>
<body>
    <div id="container">
        <!--
            Header do app, onde terá uma img da cruz a data do dia e um span 'Leitura da missa', cada um com seu id especifico para poder acessar via js.
        -->
        <header>
            <img id="img_ostensorio_header" src="assets/img/ostensorio.png" alt="imagem de um ostensorio dourada">
            <p id="date"></p>
            <div id="search_date">
                <input type="date" name="" id="data_hoje_calendar">
                <button type="button" id="button_buscar">Buscar</button>
            </div>
            
            <p id="week_temp"></p>
            <span id="logo_missa">Leitura da Missa</span>
        </header>

        <!--Div onde contem os 4 botoes para as leituras-->
        <div id="btn_to_read">
            <!-- Primeira leitura-->
            <div class="btn" id="btn_leitura-1">
                <img class="img_btn" src="assets/img/first_read.png" alt="">
            <!--    <span>1ª Leitura</span> -->
            </div>

            <!-- Salmo-->
            <div class="btn" id="btn_salmo">
                <img class="img_btn" src="assets/img/salmo.png" alt="">
            <!--    <span>Salmo</span> -->
            </div>

            <!-- Segunda leitura-->
            <div class="btn" id="btn_leitura-2">
                <img class="img_btn" src="assets/img/second_read.png" alt="">
            <!--    <span>2ª Leitura</span> -->
            </div>

            <!-- Evangelho-->
            <div class="btn" id="btn_evangelho">
                <img class="img_btn" src="assets/img/evangelho.png" alt="">
            <!--    <span>Evangelho</span>  -->
            </div>
        </div>

        <!--Div onde aparecerá as leituras e o salmo, vinda da requisao de uma API -->
        <div id="content">
            <div id="box_tittle">
                <h2 id="tittle">Leitura</h2>
                <span id="reference"></span>
            </div>
            
            <div id="text_content">
                
            </div>
        </div>

        <!--Footer com duas div, 1 vai conter o desenvolvedor e suas redes sociais e a a 2 div contem referencias de links ao qual foi usado os icons para desenvolvimento do app-->
        <footer>
            <div id="social_medias">
                <p>Desenvolvido por Igor Mariano</p>
                <ul>
                    <li>
                        <a href="https://www.linkedin.com/in/igor-mariano-a3699b3b6/" target="_blank" aria-label="LinkedIn">
                            <i class="fa-brands fa-linkedin"></i>
                        </a>
                    </li>
                    <li>
                        <a href="https://github.com/Igor25275" target="_blank" aria-label="GitHub">
                            <i class="fa-brands fa-github"></i>
                        </a>
                    </li>
                </ul>
            </div>
            
        </footer>
    </div>
</body>

<script src="assets/Js/script.js"></script>
<script defer src="/_vercel/insights/script.js"></script>
</html>
